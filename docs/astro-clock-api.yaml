openapi: 3.0.0
info:
  title: Astro Clock API
  version: 1.0.0
  description: API for astronomical chart calculations and job management
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the server
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  db_enabled:
                    type: boolean
                    description: Whether database feature is enabled
                    example: true

  /chart:
    get:
      summary: Generate astrological chart
      description: Generates and returns an astrological chart as PNG or SVG
      operationId: getChart
      parameters:
        - name: lat
          in: query
          description: Latitude of the location
          schema:
            type: number
            format: double
            default: 0.0
        - name: lon
          in: query
          description: Longitude of the location
          schema:
            type: number
            format: double
            default: 0.0
        - name: time
          in: query
          description: Time for the chart (optional)
          schema:
            type: string
        - name: format
          in: query
          description: Output format - "svg" or "png" (default: png)
          schema:
            type: string
            enum: [svg, png]
            default: png
      responses:
        '200':
          description: Chart image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
        '500':
          description: Internal server error

  /api/v1/load:
    post:
      summary: Create load job
      description: |
        Creates and executes a data load job. 
        When sync=true, blocks until completion and returns result.
        When sync=false or omitted, returns immediately with job-id for polling.
      operationId: createLoadJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_date
                - days
              properties:
                start_date:
                  type: string
                  description: Start date in YYYY-MM-DD format
                  example: "2024-01-01"
                days:
                  type: integer
                  description: Number of days to load (1-365)
                  minimum: 1
                  maximum: 365
                  example: 7
                sync:
                  type: boolean
                  description: If true, execute synchronously and wait for completion
                  default: false
      responses:
        '200':
          description: Sync load completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadSyncResponse'
        '202':
          description: Async load job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadAsyncResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /api/v1/jobs/{id}:
    get:
      summary: Get job status
      description: Retrieves the details and status of a specific job
      operationId: getJob
      parameters:
        - name: id
          in: path
          required: true
          description: Job UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /api/v1/jobs:
    get:
      summary: List jobs
      description: Returns a paginated list of jobs
      operationId: listJobs
      parameters:
        - name: status
          in: query
          description: Filter by job status
          schema:
            type: string
            enum: [pending, in_process, complete, failed]
        - name: limit
          in: query
          description: Maximum number of jobs to return (default: 20, max: 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset (default: 0)
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListJobsResponse'
        '400':
          description: Invalid query parameters
        '500':
          description: Internal server error

  /api/v1/query/wedding:
    post:
      summary: Execute wedding query
      description: |
        Execute a wedding date query.
        When sync=true, blocks until completion and returns result.
        When sync=false or omitted, returns immediately with job-id for polling.
      operationId: queryWedding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Sync query completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySyncResponse'
        '202':
          description: Async query job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryAsyncResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

  /api/v1/query/project:
    post:
      summary: Execute project query
      description: |
        Execute a project start date query.
        When sync=true, blocks until completion and returns result.
        When sync=false or omitted, returns immediately with job-id for polling.
      operationId: queryProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Sync query completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySyncResponse'
        '202':
          description: Async query job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryAsyncResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

  /api/v1/query/travel:
    post:
      summary: Execute travel query
      description: |
        Execute a travel date query.
        When sync=true, blocks until completion and returns result.
        When sync=false or omitted, returns immediately with job-id for polling.
      operationId: queryTravel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Sync query completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySyncResponse'
        '202':
          description: Async query job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryAsyncResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

  /api/v1/query/{query_name}:
    post:
      summary: Execute generic named query
      description: |
        Execute a named query (wedding, project, or travel).
        When sync=true, blocks until completion and returns result.
        When sync=false or omitted, returns immediately with job-id for polling.
      operationId: executeQuery
      parameters:
        - name: query_name
          in: path
          required: true
          description: Name of the query to execute
          schema:
            type: string
            enum: [wedding, project, travel]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Sync query completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySyncResponse'
        '202':
          description: Async query job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryAsyncResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

  /api/v1/chart/data:
    get:
      summary: Get chart data as JSON
      description: |
        Returns structured astrological chart data including planet positions,
        house cusps, aspects, grand trines, and moon void of course information.
        Suitable for display in external applications.
      operationId: getChartData
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude of the location (-90 to 90)
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
        - name: lon
          in: query
          required: true
          description: Longitude of the location (-180 to 180)
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
        - name: time
          in: query
          required: false
          description: Time for the chart (optional, defaults to current time)
          schema:
            type: string
      responses:
        '200':
          description: Chart data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartDataResponse'
        '400':
          description: Invalid request parameters (missing or invalid lat/lon)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during chart calculation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    LoadRequest:
      type: object
      required:
        - start_date
        - days
      properties:
        start_date:
          type: string
          description: Start date in YYYY-MM-DD format
        days:
          type: integer
          description: Number of days to load (1-365)
          minimum: 1
          maximum: 365
        sync:
          type: boolean
          description: Execute synchronously
          default: false

    LoadSyncResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          example: complete
        result:
          type: object
          description: Job result data (present when complete)

    LoadAsyncResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          example: pending
        poll_url:
          type: string
          description: URL to poll for job status
          example: "/api/v1/jobs/00000000-0000-0000-0000-000000000000"

    QueryRequest:
      type: object
      required:
        - start_date
        - days
      properties:
        start_date:
          type: string
          description: Start date in YYYY-MM-DD format
        days:
          type: integer
          description: Number of days to query (1-366)
          minimum: 1
          maximum: 366
        sync:
          type: boolean
          description: Execute synchronously
          default: false

    QuerySyncResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
        result:
          type: object
          description: Query result data (present when complete)

    QueryAsyncResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          example: pending
        message:
          type: string
          description: Status message with polling instructions

    JobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        job_type:
          type: string
          example: load
        status:
          type: string
          enum: [pending, in_process, complete, failed]
        payload:
          type: object
          description: Job input parameters
        result:
          type: object
          description: Job output (present when complete)
        error:
          type: object
          description: Error details (present when failed)
          properties:
            code:
              type: string
            message:
              type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    ListJobsResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/JobResponse'
        total:
          type: integer
          description: Total number of jobs matching filter
        limit:
          type: integer
          description: Limit used
        offset:
          type: integer
          description: Offset used

    ChartDataResponse:
      type: object
      description: Complete astrological chart data
      properties:
        planets:
          type: array
          description: Positions of all planets
          items:
            $ref: '#/components/schemas/PlanetPosition'
        houses:
          $ref: '#/components/schemas/HouseCusps'
        aspects:
          type: array
          description: Aspects between planets
          items:
            $ref: '#/components/schemas/Aspect'
        grand_trines:
          type: array
          description: Grand trine patterns found
          items:
            $ref: '#/components/schemas/GrandTrine'
        moon_void_of_course:
          type: string
          nullable: true
          description: Moon void of course information if applicable
        metadata:
          $ref: '#/components/schemas/ChartMetadata'

    PlanetPosition:
      type: object
      description: Position data for a single planet
      properties:
        name:
          type: string
          description: Planet name
          example: Mars
        position:
          $ref: '#/components/schemas/Position'
        retrograde:
          type: boolean
          description: Whether the planet is retrograde
          example: false

    Position:
      type: object
      description: Celestial coordinates and motion data
      properties:
        longitude:
          type: number
          format: double
          description: Ecliptic longitude in degrees (0-360)
          example: 125.5
        latitude:
          type: number
          format: double
          description: Ecliptic latitude in degrees
          example: -1.2
        distance:
          type: number
          format: double
          description: Distance in AU
          example: 1.5
        speed_lon:
          type: number
          format: double
          description: Longitudinal speed in degrees/day
          example: 0.5
        speed_lat:
          type: number
          format: double
          description: Latitudinal speed in degrees/day
          example: 0.01
        speed_dist:
          type: number
          format: double
          description: Distance change in AU/day
          example: 0.001

    HouseCusps:
      type: object
      description: House cusp positions for a chart
      properties:
        asc:
          type: number
          format: double
          description: Ascendant (Rising) degree
          example: 180.0
        mc:
          type: number
          format: double
          description: Midheaven (MC) degree
          example: 270.0
        dc:
          type: number
          format: double
          description: Descendant degree
          example: 0.0
        ic:
          type: number
          format: double
          description: Imum Coeli (IC) degree
          example: 90.0
        houses:
          type: array
          description: All 12 house cusp degrees
          items:
            type: number
            format: double
          minItems: 12
          maxItems: 12
        system:
          type: string
          description: House system used
          example: Placidus

    Aspect:
      type: object
      description: An astrological aspect between two planets
      properties:
        aspect_type:
          $ref: '#/components/schemas/AspectType'
        planet1:
          type: string
          description: First planet name
          example: Sun
        planet2:
          type: string
          description: Second planet name
          example: Moon
        longitude1:
          type: number
          format: double
          description: Longitude of first planet
          example: 45.0
        longitude2:
          type: number
          format: double
          description: Longitude of second planet
          example: 135.0
        orb:
          type: number
          format: double
          description: Orb in degrees
          example: 2.5

    AspectType:
      type: string
      description: Type of astrological aspect
      enum:
        - Conjunction
        - Opposition
        - Square
        - Trine
        - Sextile
        - GrandTrine

    GrandTrine:
      type: object
      description: A grand trine pattern (three planets in trine aspect)
      properties:
        planet1:
          type: string
          description: First planet name
          example: Sun
        planet2:
          type: string
          description: Second planet name
          example: Mars
        planet3:
          type: string
          description: Third planet name
          example: Jupiter
        longitude1:
          type: number
          format: double
          description: Longitude of first planet
          example: 120.0
        longitude2:
          type: number
          format: double
          description: Longitude of second planet
          example: 240.0
        longitude3:
          type: number
          format: double
          description: Longitude of third planet
          example: 0.0

    ChartMetadata:
      type: object
      description: Metadata about the chart calculation
      properties:
        latitude:
          type: number
          format: double
          description: Location latitude
          example: 40.7128
        longitude:
          type: number
          format: double
          description: Location longitude
          example: -74.006
        julian_day:
          type: number
          format: double
          description: Julian day number for the calculation
          example: 2451545.0
        house_system:
          type: string
          description: House system used for calculation
          example: Placidus

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code
          example: invalid_date
        message:
          type: string
          description: Human-readable error message